# rollouts-values.yaml
# Tuned for arm64 homelab; metrics enabled for future AnalysisTemplate stage
controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prometheus   # so your kube-prometheus-stack scrapes it
dashboard:
  enabled: true              # web UI for visualizing rollouts (nice for demos)
