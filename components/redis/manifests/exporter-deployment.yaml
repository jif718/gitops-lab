apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: redis
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.86.0-alpine
          args:
            - --redis.addr=redis://redis.redis.svc.cluster.local:6379
          env:
            # exporter reads REDIS_PASSWORD automatically; from secret, not plaintext
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 64Mi, cpu: 50m }
