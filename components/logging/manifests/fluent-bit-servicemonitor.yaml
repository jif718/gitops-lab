apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    release: prometheus   # must match Prometheus serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  namespaceSelector:
    matchNames:
      - logging
  endpoints:
    - port: http          # confirm actual port name from svc yaml; Fluent Bit chart usually names it "http" or "http-metrics"
      path: /api/v1/metrics/prometheus
      interval: 30s
