apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https        # match your existing listener name (same as grafana/kibana routes)
  hostnames:
    - longhorn.local
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
