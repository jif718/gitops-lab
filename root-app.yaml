# root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://linux03.local:3000/admin/gitops-lab.git
    targetRevision: main
    path: .
    directory:
      recurse: true
      include: '{infra/**/*-app.yaml,infra/**/*-appset.yaml,apps/*-appset.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false     # deleting an app definition must never auto-delete the Application
      selfHeal: true
