# apps/kube-prometheus-stack-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 84.5.0
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/helm-values/monitoring/values.yaml   # resolved inside the second source
    - repoURL: http://linux03.local:3000/admin/jif-lab-platform.git
      targetRevision: main
      ref: values          # referenced by $values above
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions: ['.webhooks[]?.clientConfig.caBundle']
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions: ['.webhooks[]?.clientConfig.caBundle']
  # syncPolicy omitted: adoption, diff first
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
