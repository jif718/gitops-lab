# apps/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://linux03.local:3000/admin/jif-lab-platform.git
    targetRevision: main
    path: apps
    # recurse defaults to false: only top-level apps/*.yaml are rendered,
    # apps/redis/ raw manifests are naturally excluded
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  # syncPolicy intentionally omitted: adoption pattern, diff first
