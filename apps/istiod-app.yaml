apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # istiod AFTER base (higher wave)
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.30.2
    helm:
      values: |
        pilot:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          autoscaleEnabled: false
          replicaCount: 1
        meshConfig:
          accessLogFile: /dev/stdout
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
