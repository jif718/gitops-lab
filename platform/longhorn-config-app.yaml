# platform/longhorn-config-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after longhorn (wave 0), CRDs must exist first
spec:
  project: default
  source:
    repoURL: https://linux03.local:3000/admin/gitops-lab.git
    targetRevision: main
    path: manifests/longhorn
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - Prune=false
