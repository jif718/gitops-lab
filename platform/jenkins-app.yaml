apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # multi-source: chart from helm repo, values from this git repo
  sources:
    - repoURL: https://charts.jenkins.io
      chart: jenkins
      targetRevision: 5.9.25            # match current helm release exactly
      helm:
        valueFiles:
          - $values/helm-values/jenkins/values.yaml
    - repoURL: http://linux03.local:3000/admin/gitops-lab.git
      targetRevision: main
      ref: values                        # referenced by $values above
      path: manifests/jenkins        # ADD: same source now also renders this dir
      directory:
        recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: false        # stateful app; never auto-delete PVC/PV
      selfHeal: true
