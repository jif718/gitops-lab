# apps/storage-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://linux03.local:3000/admin/gitops-lab.git  # match your existing apps/*.yaml
    targetRevision: main
    path: manifests/storage
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: ""
      kind: PersistentVolume
      jsonPointers:
        # written by the PV binder at runtime after binding
        - /spec/claimRef/uid
        - /spec/claimRef/resourceVersion
  # syncPolicy intentionally omitted: verify `argocd app diff` shows
  # tracking annotations only, then add the block below
  syncPolicy:
    automated:
      prune: false      # pruning a bound PV releases the volume - never enable
      selfHeal: false   # PV spec is near-immutable; selfHeal only adds noise
    syncOptions:
      - ApplyOutOfSyncOnly=true
