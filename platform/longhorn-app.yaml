# platform/longhorn-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - chart: longhorn
      repoURL: https://charts.longhorn.io/
      targetRevision: v1.12.0
      helm:
        valuesObject:
          preUpgradeChecker:
            jobEnabled: false       # official ArgoCD guidance: helm-hook job breaks argocd sync
          persistence:
            defaultClass: true
            defaultClassReplicaCount: 2
          defaultSettings:
            defaultReplicaCount: 2  # 2 replicas on a 3-node lab, saves disk
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Prune=false                 # chart owns CRDs, never auto-prune
      - ServerSideApply=true        # large CRDs exceed last-applied annotation limit
