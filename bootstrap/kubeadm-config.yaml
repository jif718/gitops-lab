apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "10.211.55.8" # 你的 Master IP
  bindPort: 6443
nodeRegistration:
  name: "linux01.local"
  taints: null
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: "1.35.2" # 请根据你的版本调整
imageRepository: linux02.local/k8s
networking:
  dnsDomain: "cluster.local"
  serviceSubnet: "10.96.0.0/12"   # Service 网段，现在安全了
  podSubnet: "10.244.0.0/16"      # Flannel 要求的 Pod 网段
controllerManager:
  extraArgs:
    allocate-node-cidrs: "true"   # 自动分配 PodCIDR，解决你之前的 NotReady 问题
    cluster-cidr: "10.244.0.0/16"
    service-cluster-ip-range: "10.96.0.0/12"
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd             # 确保与 Containerd 一致
