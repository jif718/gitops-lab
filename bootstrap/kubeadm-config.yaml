apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "10.211.55.8" # your Master IP
  bindPort: 6443
nodeRegistration:
  name: "linux01.local"
  taints: null
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: "1.35.2" # adjust to match your version
imageRepository: linux02.local/k8s
networking:
  dnsDomain: "cluster.local"
  serviceSubnet: "10.96.0.0/12"   # Service subnet; safe now
  podSubnet: "10.244.0.0/16"      # Pod subnet required by Flannel
controllerManager:
  extraArgs:
    allocate-node-cidrs: "true"   # auto-allocate PodCIDR; fixes the earlier NotReady issue
    cluster-cidr: "10.244.0.0/16"
    service-cluster-ip-range: "10.96.0.0/12"
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd             # keep consistent with Containerd
