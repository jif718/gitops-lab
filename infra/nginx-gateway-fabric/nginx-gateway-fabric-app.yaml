apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-fabric
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: ghcr.io/nginx/charts          # OCI: no oci:// prefix, no chart name
      chart: nginx-gateway-fabric            # chart name is separate; repoURL is its "directory"
      targetRevision: "2.6.3"
      helm:
        releaseName: ngf                     # key: pin the existing release name, don't recreate the ingress gateway
        valueFiles:
          - $values/infra/nginx-gateway-fabric/nginx-gateway-fabric-values.yaml
    - repoURL: http://linux03.local:3000/admin/gitops-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true 
