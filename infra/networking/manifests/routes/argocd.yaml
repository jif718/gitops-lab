apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
  - name: main-gateway
    namespace: nginx-gateway
    sectionName: https
  hostnames:
  - argocd.local
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80          # Service 的 80 端口,后端 pod 监听 HTTP
