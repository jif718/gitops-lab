# elasticsearch.yaml
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: lab-es
  namespace: logging
spec:
  version: 9.4.2
  nodeSets:
  - name: default
    count: 3
    config:
      node.store.allow_mmap: false        # fallback: avoid mmap limit even if sysctl missed
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          env:
          - name: ES_JAVA_OPTS
            value: "-Xms512m -Xmx512m"     # learning-only heap
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 1.5Gi               # headroom over the 512m heap + off-heap
              cpu: 1
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data           # ECK default PVC name; must match for binding
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-single
        resources:
          requests:
            storage: 5Gi
