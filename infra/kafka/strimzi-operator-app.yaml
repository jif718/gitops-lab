apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://strimzi.io/charts/
    chart: strimzi-kafka-operator
    targetRevision: 1.1.0
    helm:
      valuesObject:
        # operator resource footprint (chart defaults are larger)
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      selfHeal: true
      # NO prune — CRD-owning app, cluster discipline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true        # Strimzi CRDs exceed 262KB annotation limit
