# elasticsearch-exporter.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-exporter
  template:
    metadata:
      labels:
        app: elasticsearch-exporter
    spec:
      containers:
      - name: exporter
        image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.8.0
        args:
        - --es.uri=https://lab-es-es-http:9200
        - --es.all
        - --es.indices
        - --es.ssl-skip-verify   # skip ECK self-signed cert verification
        env:
        - name: ES_USERNAME
          valueFrom:
            secretKeyRef:
              name: elasticsearch-exporter-creds
              key: username
        - name: ES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: elasticsearch-exporter-creds
              key: password
        ports:
        - containerPort: 9114
          name: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-exporter
  namespace: logging
  labels:
    app: elasticsearch-exporter
spec:
  ports:
  - port: 9114
    name: metrics
  selector:
    app: elasticsearch-exporter
