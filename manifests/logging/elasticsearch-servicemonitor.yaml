# elasticsearch-servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: elasticsearch-exporter
  namespace: logging
  labels:
    release: prometheus   # matches your existing Prometheus operator selector
spec:
  selector:
    matchLabels:
      app: elasticsearch-exporter
  endpoints:
  - port: metrics
    interval: 30s
