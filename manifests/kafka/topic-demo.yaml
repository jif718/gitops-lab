apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: demo-events
  namespace: kafka
  labels:
    strimzi.io/cluster: lab-kafka    # required: tells topic operator which cluster owns this
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 86400000           # 1 day, keep disk usage small on 5Gi volumes
    segment.bytes: 104857600         # 100MB
