apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: orders
  namespace: kafka
  labels:
    strimzi.io/cluster: lab-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 86400000          # 1 day
    min.insync.replicas: 2          # explicit, matches cluster default; drill #2 depends on this
