apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kibana
  namespace: logging
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - kibana.local
  rules:
    - backendRefs:
        - name: lab-kibana-kb-http
          port: 5601
